; GPS lap timer for ESP32 — Ninja 400 / MSP Bangkok
; Environments:
;   esp32dev        -> normal firmware, RaceChrono BLE streaming (default)
;   esp32dev-sim    -> simulation mode (virtual track, no GPS needed)
;   esp32dev-nmea   -> generic Bluetooth NMEA GPS instead of RaceChrono BLE
;                      (TrackAddict, Harry's LapTimer, mock location — Android)
;   esp32dev-replay -> NMEA lines pasted/streamed on the USB serial port are
;                      treated as GPS input (replay a recorded session)
;   pitbox          -> the coach-side receiver (second ESP32 + OLED + LoRa)
;   native          -> host-side unit tests of the timing core: pio test -e native

[platformio]
default_envs = esp32dev

[esp32]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
; 3 MB app partition: needed for the Bluetooth stacks, keeps a ~900 KB
; LittleFS partition for the lap log and the track files.
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    olikraus/U8g2@^2.35.30
    h2zero/NimBLE-Arduino@^1.4.1
    sandeepmistry/LoRa@^0.8.0
; evaluate #if in includes, so the unused Bluetooth stack is not built
lib_ldf_mode = chain+
build_flags = -Wall
; the bike firmware; the pit receiver has its own main (env:pitbox)
build_src_filter = +<*> -<pitbox_main.cpp>

[env:esp32dev]
extends = esp32

[env:esp32dev-sim]
extends = esp32
build_flags = ${esp32.build_flags} -DSIMULATE_GPS

[env:esp32dev-nmea]
extends = esp32
build_flags = ${esp32.build_flags} -DBT_MODE=2

[env:esp32dev-replay]
extends = esp32
build_flags = ${esp32.build_flags} -DREPLAY_GPS

; Coach-side pit display: ESP32 + SSD1306 + SX127x LoRa, no other sensor.
[env:pitbox]
extends = esp32
build_src_filter = +<*> -<main.cpp>

[env:native]
platform = native
build_flags = -std=gnu++17 -Wall
test_build_src = false
