; GPS lap timer for ESP32 — Ninja 400 / MSP Bangkok
; Two environments:
;   esp32dev      -> normal firmware (real GPS)
;   esp32dev-sim  -> simulation mode (runs on a virtual track, to test the
;                    display and the timing logic without GPS or a satellite fix)

[platformio]
default_envs = esp32dev

[env]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    olikraus/U8g2@^2.35.30
build_flags = -Wall

[env:esp32dev]

[env:esp32dev-sim]
build_flags = ${env.build_flags} -DSIMULATE_GPS
